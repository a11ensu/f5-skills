# Cafe Demo Application -- NodePort Services
# Deploys two services (coffee, tea) for testing L7 path-based routing.
# Use this variant when CIS is deployed with --pool-member-type=nodeport.
#
# CUSTOMISE:
#   - nodePort values if the defaults conflict with existing services
#
# Apply to a namespace: kubectl apply -f cafe-svc-nodeport.yaml -n <namespace>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coffee
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coffee
  template:
    metadata:
      labels:
        app: coffee
    spec:
      containers:
        - image: nginxdemos/nginx-hello:plain-text
          imagePullPolicy: IfNotPresent
          name: coffee
          ports:
            - containerPort: 8080
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: coffee-svc
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080
      nodePort: 30180
  selector:
    app: coffee
  type: NodePort

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tea
  template:
    metadata:
      labels:
        app: tea
    spec:
      containers:
        - image: nginxdemos/nginx-hello:plain-text
          imagePullPolicy: IfNotPresent
          name: tea
          ports:
            - containerPort: 8080
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: tea-svc
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080
      nodePort: 30181
  selector:
    app: tea
  type: NodePort
