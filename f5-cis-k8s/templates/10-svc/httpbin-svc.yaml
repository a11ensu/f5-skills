# httpbin Demo Application
# A simple HTTP request/response service for testing.
# Apply to a namespace: kubectl apply -f httpbin-svc.yaml -n <namespace>
apiVersion: v1
kind: ServiceAccount
metadata:
  name: httpbin
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin
  labels:
    app: httpbin
    service: httpbin
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    app: httpbin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpbin
      version: v1
  template:
    metadata:
      labels:
        app: httpbin
        version: v1
    spec:
      serviceAccountName: httpbin
      containers:
        - image: registry-cn-hangzhou.ack.aliyuncs.com/ack-demo/httpbin:0.1.0
          imagePullPolicy: IfNotPresent
          name: httpbin
          ports:
            - containerPort: 80
