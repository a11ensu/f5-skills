# F5 CIS BIG-IP Login Secret
# Stores BIG-IP credentials as base64-encoded values.
#
# IMPORTANT: Replace the username and password values with actual BIG-IP credentials.
# Generate base64 values:
#   echo -n '<username>' | base64
#   echo -n '<password>' | base64
#
# Default placeholder values below are base64 for "admin" / "admin".
apiVersion: v1
data:
  password: YWRtaW4=
  username: YWRtaW4=
kind: Secret
metadata:
  name: bigip-login
  namespace: kube-system
type: Opaque
