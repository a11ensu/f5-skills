- name: Debug Variables
  hosts: localhost
  connection: local
  vars_files:
  - ../.config/ansible.yaml
  - ../vars/bipv1_provider.yaml
  tasks:
  - name: Debug ply_host
    debug:
      var: ply_host
  - name: Debug cbip keys
    debug:
      var: cbip.keys()
  - name: Debug transformed key
    debug:
      msg: "Transformed key: {{ ply_host | lower | replace('-', '') }}"
  - name: Debug full bip (if defined)
    debug:
      var: bip
